<!-- HEADER corporativo -->
<header class="w-full bg-white shadow-md fixed top-0 left-0 z-50">
  <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <img
        src="https://static.wixstatic.com/media/632b1b_e49e5ef57a654a5eae380fe6ee1594d6~mv2.webp/v1/fill/w_69,h_47,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/632b1b_e49e5ef57a654a5eae380fe6ee1594d6~mv2.webp"
        alt="Bitwan Logo"
        class="h-10 w-auto"
      />
    </div>
    <nav class="hidden md:flex items-center gap-6 text-gray-700 font-medium">
      <span class="opacity-70">Login</span>
    </nav>
  </div>
</header>

<div class="h-16"></div>

<div
  class="min-h-[calc(100vh-4rem)] w-full bg-linear-to-br from-[#89bae7] to-[#1e88e5] p-6 flex items-center justify-center"
>
  <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-6">
    <h1 class="text-[#515353] text-2xl font-bold text-center mb-2">Gestión Documental</h1>
    <p class="text-gray-500 text-center mb-6">
      Inicia sesión con tu cuenta corporativa (serás redirigido al servidor de autenticación).
    </p>

    <button
      type="button"
      (click)="iniciarSesion()"
      class="w-full bg-blue-600 text-white px-4 py-2 rounded-lg shadow-sm hover:bg-blue-700 transition"
    >
      Iniciar sesión
    </button>
  </div>
</div>

<footer
  class="fixed bottom-0 left-0 w-full bg-white text-gray-600 text-center py-3 shadow-[0_-2px_8px_rgba(0,0,0,0.08)] z-50"
>
  <p class="text-sm font-medium">© Bitwan - Gestión Documental</p>
</footer>
